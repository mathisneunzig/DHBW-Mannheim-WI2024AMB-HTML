<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayer 04 Leverkusen</title>
    <link rel="stylesheet" href="bayer04.css">
</head>
<body>
    <div class="page-container">
        <header class="club-header">
            <p class="club-kicker">Bundesliga - Vereinsprofil</p>
            <h1>Bayer 04 Leverkusen</h1>
            <img src="https://upload.wikimedia.org/wikipedia/de/f/f7/Bayer_Leverkusen_Logo.svg" alt="Vereinslogo von Bayer 04 Leverkusen" class="club-logo" referrerpolicy="no-referrer">
        </header>

        <main>
            <section class="info-card" aria-labelledby="profil-title">
                <h2 id="profil-title">Vereinsprofil</h2>
                <dl class="club-facts">
                    <div>
                        <dt>Trainer</dt>
                        <dd>Kasper Hjulmand</dd>
                    </div>
                    <div>
                        <dt>Stadt</dt>
                        <dd>Leverkusen</dd>
                    </div>
                    <div>
                        <dt>Stadion</dt>
                        <dd>BayArena</dd>
                    </div>
                    <div>
                        <dt>Kapazitat</dt>
                        <dd>30.210 Zuschauer</dd>
                    </div>
                </dl>
            </section>

            <section class="media-grid" aria-label="Bilder von Trainer und Stadion">
                <article class="media-card">
                    <h2>Trainer</h2>
                    <img src="https://b04-ep-media-prod.azureedge.net/pickerimages/Hjulmand_S2526_2993h_813663_XL.png" alt="Trainer Kasper Hjulmand" class="media-image" referrerpolicy="no-referrer">
                </article>
                <article class="media-card">
                    <h2>Stadion</h2>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Bayarena_Leverkusen_2020.jpg" alt="Die BayArena in Leverkusen" class="media-image" referrerpolicy="no-referrer">
                </article>
            </section>

            <section class="info-card" aria-labelledby="links-title">
                <h2 id="links-title">Offizielle Kanale</h2>
                <p>Aktuelle Infos: Stand 20.03.2026, Quelle offizielle Teamseite.</p>
                <a href="https://www.bayer04.de/de-de/team/werkself/bayer-04-leverkusen" target="_blank" rel="noopener noreferrer" class="official-link">Zur offiziellen Teamseite</a>
            </section>
        </main>

        <footer class="page-footer">
            <a href="../index.html" class="back-link">Zuruck zur Tabelle</a>
        </footer>
    </div>
</body>
</html>
